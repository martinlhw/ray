syntax = "proto3";

package ray.rpc.events;

import "src/ray/protobuf/common.proto";

// Static identity and metadata for a worker, emitted once when the worker
// registers. The dynamic lifecycle (ALIVE/DEAD transitions, exit info) is carried
// by WorkerLifecycleEvent and correlated back to this event by worker_id.
message WorkerDefinitionEvent {
  bytes worker_id = 1;
  bytes node_id = 2;
  WorkerType worker_type = 3;
  uint32 pid = 4;
}
