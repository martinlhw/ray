syntax = "proto3";

package ray.rpc.events;

import "src/ray/protobuf/common.proto";
import "google/protobuf/timestamp.proto";

message WorkerLifecycleEvent {
  enum State{ ALIVE = 0; DEAD = 1;}
  message DeathInfo {
    WorkerExitType exit_type = 1;
    string exit_detail = 2;
    // The worker's memory usage (USS, in bytes) at the moment it was killed.
    // Only present when exit_type is NODE_OUT_OF_MEMORY; unset for all other death
    // causes. Consumers must gate on presence (or on exit_type) rather than
    // treating a missing value as 0.
    optional int64 memory_used_bytes = 3;
  }
  message StateTransition {
    State state = 1;
    // GCS-observed time
    google.protobuf.Timestamp timestamp = 2;
    // raylet requested the process start
    uint64 worker_launch_time_ms = 3;
    // the OS process actually started
    uint64 worker_launched_time_ms = 4;
    // the worker finished init and became ready
    uint64 start_time_ms = 5;
    // the worker process actually ended
    uint64 end_time_ms = 6;
    DeathInfo death_info = 7;
  }
  bytes worker_id = 1;
  bytes node_id = 2;
  WorkerType worker_type = 3;
  uint32 pid = 4;
  // The ID of the job this worker belongs to.
  bytes job_id = 5;
  repeated StateTransition state_transitions = 6;
}
